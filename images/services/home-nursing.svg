<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Home Nursing">
  <defs>
    <linearGradient id="field10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDFDFB"/><stop offset="1" stop-color="#F2EEE5"/>
    </linearGradient>
    <radialGradient id="glow10" cx="0.24" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#EAD9B0" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#EAD9B0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shaft10" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#EAD9B0" stop-opacity="0.65"/>
      <stop offset="0.6" stop-color="#C29A55" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#C29A55" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft10" x="-40%" y="-40%" width="180%" height="180%">
