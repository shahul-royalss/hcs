<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Bedridden Patient Care">
  <defs>
    <linearGradient id="field16" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDFDFB"/><stop offset="1" stop-color="#F2EEE5"/>
    </linearGradient>
    <radialGradient id="glow16" cx="0.24" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#A7D3CE" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#A7D3CE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shaft16" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#EAD9B0" stop-opacity="0.65"/>
      <stop offset="0.6" stop-color="#C29A55" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#C29A55" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft16" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="grain16">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#field16)"/>
  <rect width="1200" height="800" fill="url(#glow16)"/>
  <!-- light shaft entering from upper left -->
