<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" role="img" aria-label="Morning light falls across a living room as a caregiver sits with an elder">
  <defs>
    <linearGradient id="field1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDFDFB"/><stop offset="1" stop-color="#F2EEE5"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.24" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#EAD9B0" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#EAD9B0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shaft1" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#EAD9B0" stop-opacity="0.65"/>
      <stop offset="0.6" stop-color="#C29A55" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#C29A55" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft1" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="grain1">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1400" height="950" fill="url(#field1)"/>
  <rect width="1400" height="950" fill="url(#glow1)"/>
  <!-- tall window, sheer light -->
  <g>
    <path d="M840 589 v-323 a126 126 0 0 1 252 0 v323 z"
      fill="rgba(234,217,176,0.4)" stroke="rgba(10,27,46,0.16)" stroke-width="2.5"/>
    <line x1="965.9999999999999" y1="209" x2="965.9999999999999" y2="589" stroke="rgba(10,27,46,0.16)" stroke-width="2"/>
    <line x1="840" y1="418" x2="1092" y2="418" stroke="rgba(10,27,46,0.16)" stroke-width="2"/>
  </g>
  <polygon points="812,190 1120,190 728,969 336,969"
    fill="url(#shaft1)" filter="url(#soft1)"/>
  <!-- floor line -->
  <line x1="70" y1="684" x2="1330" y2="684" stroke="rgba(10,27,46,0.14)" stroke-width="2"/>
  <!-- armchair + elder -->
  <g opacity="0.92">
    <path d="M336 684 v-123.5 q0-33.25 35-33.25 h161 q35 0 35 33.25 v123.5 z" fill="#1F6F6B" opacity="0.28"/>
    <circle cx="450.8" cy="475" r="42.75" fill="#16324F"/>
    <path d="M398.99999999999994 684 c0-95 11.200000000000001-152 51.8-152 s51.8 57 51.8 152 z" fill="#16324F"/>
  </g>
  <!-- caregiver, leaning in with cup -->
  <g opacity="0.92">
    <circle cx="630" cy="399" r="38" fill="#1F6F6B"/>
    <path d="M581 684 c0-133 14-232.75 49.00000000000001-232.75 s49.00000000000001 99.75 49.00000000000001 232.75 z" fill="#1F6F6B"/>
    <line x1="611.8" y1="522.5" x2="539" y2="555.75" stroke="#1F6F6B" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- teacup between them -->
  <g>
    <ellipse cx="520.8" cy="568.1" rx="17" ry="6" fill="#C29A55" opacity="0.85"/>
    <path d="M505.79999999999995 568.1 q15 22 30 0" fill="#C29A55" opacity="0.85"/>
    <path d="M516.8 541.5 q4-8 8 0 M522.8 532 q4-8 8 0" stroke="#C29A55" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
  <!-- plant -->
  <g stroke="#2E7D5B" stroke-width="4" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M126 684 q-2-85.5 -28-123.5"/>
    <path d="M126 684 q2-95 25.2-137.75"/>
    <path d="M126 684 q0-114 4-152"/>
  </g>
  <circle cx="112" cy="256" r="2.6" fill="#C29A55" opacity="0.41"/>
    <circle cx="341" cy="184" r="2.4" fill="#C29A55" opacity="0.50"/>
    <circle cx="667" cy="274" r="3.4" fill="#C29A55" opacity="0.26"/>
    <circle cx="329" cy="273" r="2.6" fill="#C29A55" opacity="0.30"/>
    <circle cx="610" cy="120" r="3.4" fill="#C29A55" opacity="0.45"/>
    <circle cx="234" cy="571" r="3.5" fill="#C29A55" opacity="0.30"/>
    <circle cx="435" cy="229" r="3.6" fill="#C29A55" opacity="0.40"/>
    <circle cx="224" cy="83" r="1.5" fill="#C29A55" opacity="0.43"/>
    <circle cx="549" cy="347" r="2.1" fill="#C29A55" opacity="0.29"/>
    <circle cx="340" cy="398" r="3.6" fill="#C29A55" opacity="0.44"/>
    <circle cx="441" cy="547" r="1.8" fill="#C29A55" opacity="0.39"/>
    <circle cx="473" cy="490" r="2.0" fill="#C29A55" opacity="0.52"/>
    <circle cx="621" cy="284" r="2.9" fill="#C29A55" opacity="0.49"/>
    <circle cx="376" cy="503" r="2.7" fill="#C29A55" opacity="0.45"/>
  <g transform="translate(1290,42) scale(0.95)" opacity="0.8">
    <path d="M0 18 C0 6 10-2 19 4 c3 2 5 5 6 8 1-3 3-6 6-8 9-6 19 2 19 14 0 14-18 24-25 28 C18 42 0 32 0 18z" fill="none" stroke="#C29A55" stroke-width="3"/>
    <path d="M8 22 h10 l4-8 7 18 4-8 h11" stroke="#C29A55" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <rect width="1400" height="950" filter="url(#grain1)" opacity="0.35" fill="none"/>
</svg>