    <circle cx="693" cy="294" r="3.0" fill="#C29A55" opacity="0.53"/>
    <circle cx="637" cy="118" r="3.8" fill="#C29A55" opacity="0.53"/>
    <circle cx="423" cy="535" r="2.9" fill="#C29A55" opacity="0.22"/>
    <circle cx="115" cy="496" r="1.7" fill="#C29A55" opacity="0.38"/>
    <circle cx="409" cy="125" r="3.4" fill="#C29A55" opacity="0.54"/>
    <circle cx="412" cy="378" r="2.7" fill="#C29A55" opacity="0.29"/>
