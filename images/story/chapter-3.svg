<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 840" role="img" aria-label="Life pulls everyone away">
  <defs>
    <linearGradient id="field6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16324F"/><stop offset="1" stop-color="#0A1B2E"/>
    </linearGradient>
    <radialGradient id="glow6" cx="0.24" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#C29A55" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#C29A55" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shaft6" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#EAD9B0" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#C29A55" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#C29A55" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft6" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="grain6">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1440" height="840" fill="url(#field6)"/>
  <rect width="1440" height="840" fill="url(#glow6)"/>
  <!-- light shaft entering from upper left -->
  <polygon points="172.79999999999998,-84 489.6,-84 892.8,882 403.20000000000005,882"
