<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 840" role="img" aria-label="Time moves quietly">
  <defs>
    <linearGradient id="field5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDFDFB"/><stop offset="1" stop-color="#F2EEE5"/>
    </linearGradient>
    <radialGradient id="glow5" cx="0.24" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#E4E4DE" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#E4E4DE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shaft5" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#EAD9B0" stop-opacity="0.65"/>
      <stop offset="0.6" stop-color="#C29A55" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#C29A55" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft5" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="grain5">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1440" height="840" fill="url(#field5)"/>
  <rect width="1440" height="840" fill="url(#glow5)"/>
  <!-- light shaft entering from upper left -->
  <polygon points="172.79999999999998,-84 489.6,-84 892.8,882 403.20000000000005,882"
    fill="url(#shaft5)" filter="url(#soft5)"/>
  <!-- arch window with pooling light -->
  <g>
    <path d="M1036.8 571.2 v-314.4 a122.4 122.4 0 0 1 244.8 0 v314.4 z"
      fill="rgba(234,217,176,0.35)" stroke="rgba(10,27,46,0.14)" stroke-width="2"/>
    <line x1="1159.2" y1="158.88" x2="1159.2" y2="571.2" stroke="rgba(10,27,46,0.14)" stroke-width="1.5"/>
    <ellipse cx="1159.2" cy="621.6" rx="208.08" ry="37.8"
      fill="#EAD9B0" opacity="0.4" filter="url(#soft5)"/>
  </g>
  <!-- horizon hairline -->
  <line x1="86.39999999999999" y1="621.6" x2="1353.6" y2="621.6" stroke="rgba(10,27,46,0.14)" stroke-width="1.5"/>
  <circle cx="115" cy="491" r="2.7" fill="#C29A55" opacity="0.35"/>
