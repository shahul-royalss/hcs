    <circle cx="483" cy="110" r="2.2" fill="#C29A55" opacity="0.29"/>
    <circle cx="571" cy="311" r="3.1" fill="#C29A55" opacity="0.35"/>
    <circle cx="400" cy="122" r="2.2" fill="#C29A55" opacity="0.55"/>
    <circle cx="723" cy="377" r="1.8" fill="#C29A55" opacity="0.19"/>
    <circle cx="725" cy="257" r="1.9" fill="#C29A55" opacity="0.24"/>
    <circle cx="708" cy="479" r="3.1" fill="#C29A55" opacity="0.45"/>
    <circle cx="601" cy="402" r="2.0" fill="#C29A55" opacity="0.42"/>
    <circle cx="732" cy="364" r="3.5" fill="#C29A55" opacity="0.23"/>
    <circle cx="445" cy="448" r="1.5" fill="#C29A55" opacity="0.40"/>
    <circle cx="203" cy="76" r="3.4" fill="#C29A55" opacity="0.33"/>
    <circle cx="704" cy="123" r="3.1" fill="#C29A55" opacity="0.46"/>
    <circle cx="352" cy="495" r="1.3" fill="#C29A55" opacity="0.31"/>
  <g transform="translate(1348,36) scale(0.82)" opacity="0.75">
    <path d="M0 18 C0 6 10-2 19 4 c3 2 5 5 6 8 1-3 3-6 6-8 9-6 19 2 19 14 0 14-18 24-25 28 C18 42 0 32 0 18z" fill="none" stroke="#405872" stroke-width="3"/>
