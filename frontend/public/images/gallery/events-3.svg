<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1125" role="img" aria-label="Events 3">
  <defs>
    <linearGradient id="field32" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDFDFB"/><stop offset="1" stop-color="#F2EEE5"/>
    </linearGradient>
    <radialGradient id="glow32" cx="0.24" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#F0DCD4" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#F0DCD4" stop-opacity="0"/>
