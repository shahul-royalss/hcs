  <defs>
    <linearGradient id="field17" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDFDFB"/><stop offset="1" stop-color="#F2EEE5"/>
    </linearGradient>
    <radialGradient id="glow17" cx="0.24" cy="0.08" r="0.9">
      <stop offset="0" stop-color="#E2DBEE" stop-opacity="0.55"/>
