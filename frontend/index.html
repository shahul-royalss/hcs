<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Dhrishta Health Care Services | Your Family... Our Care and Responsibility</title>
    <meta
      name="description"
      content="Professional home healthcare services in Chittoor — home nursing, elder care, patient care, child care and day care. Certified nurses and verified caregivers, 24/7 support. Call +91 9959388374."
    />
    <meta name="keywords" content="home healthcare, home nursing, elder care, patient care, child care, day care, Chittoor, Dhrishta" />
    <meta name="theme-color" content="#1a3a6b" />

    <!-- Apply the saved/system theme before first paint to avoid a flash -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('dhrishta_theme')
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dhrishta Health Care Services" />
    <meta property="og:description" content="Professional home healthcare services — your family, our care and responsibility. 24/7 support in Chittoor." />
    <meta property="og:image" content="/images/logo.svg" />

    <!-- Fonts (self-hosted): Manrope (headings), Inter (body), Crimson Text
         (taglines), Noto Sans Devanagari (Hindi UI) -->
    <link rel="stylesheet" href="/fonts/fonts.css" />

    <!-- Structured data (Schema.org) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HomeHealthCareService",
        "name": "Dhrishta Health Care Services",
        "telephone": "+91 9959388374",
        "email": "info@dhrishta.com",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Near Reliance Smart Point, Bypass Road, Murakambattu",
          "addressLocality": "Chittoor",
          "addressRegion": "Andhra Pradesh",
          "postalCode": "517127",
          "addressCountry": "IN"
        },
        "openingHours": "Mo-Su 00:00-24:00",
        "slogan": "Your Family... Our Care and Responsibility"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
